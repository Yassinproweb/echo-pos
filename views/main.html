{{ template "head" . }}

<main class="relative w-[60%] h-full flex flex-col items-center justify-start p-5 pb-11 mt-[70px] gap-5 bg-pos_bla/10">
  <div id="products-card" class="relative w-full h-full flex flex-col items-start justify-start pb-11 gap-2.5">
    <div class="w-full flex items-center justify-between">
      <h3 class="text-2xl text-pos_bla font-bold shrink-0">Search Meals</h3>
      <input type="search" id="searchInput" onkeyup="searchTable()" placeholder="Search..."
        class="mb-4 w-[75%] p-2 border border-pos_bla/25 rounded outline-none">
    </div>
    <section class="w-full grid grid-cols-2 justify-start gap-3 snap-mandatory snap-y scroll-pb-9 overflow-y-scroll">
      {{ range .products }}
      {{ template "product_card" .}}
      {{ end }}
    </section>
  </div>
</main>

<aside class="w-[25%] h-full flex-col items-start justify-start p-5 border-l-2 border-l-pos_lgh/25 bg-pos_whi">
  <form id="form" class="w-full h-full flex flex-col items-start justify-start gap-5 text-pos_bla">
    <h2 class="text-2xl text-pos_bla font-bold capitalize">Enter New Order</h2>
    <div class="w-full flex flex-col items-start justify-start gap-1.5">
      <label for="order_name" class="text-base text-pos_lgh capitalize font-bold">Order name</label>
      <input type="text" id="order_name" name="order_name"
        class="w-full border-2 border-pos_lgh/45 rounded-md px-5 py-1.5 placeholder:opacity-45" disabled
        placeholder="Order name is generated by system">
    </div>

    <div class="w-full flex flex-col items-start justify-start gap-1.5">
      <label for="order_date" class="text-base text-pos_lgh capitalize font-bold">Order type</label>
      <input type="datetime" id="order_date" name="order_date"
        class="w-full border-2 border-pos_lgh/45 rounded-md px-5 py-1.5 placeholder:opacity-45" placeholder="">
    </div>

    <div class="w-full flex flex-col items-start justify-start gap-1.5">
      <label for="customer_name" class="text-base text-pos_col capitalize font-bold">Enter customer name</label>
      <input type="text" id="customer_name" name="customer_name"
        class="w-full border-2 border-pos_col/45 rounded-md px-5 py-1.5 placeholder:opacity-45" placeholder="">
    </div>

    <div class="w-full flex flex-col items-start justify-start gap-1.5">
      <label for="customer_number" class="text-base text-pos_col capitalize font-bold">Enter customer number</label>
      <input type="tel" id="customer_number" name="customer_number"
        class="w-full border-2 border-pos_col/45 rounded-md px-5 py-1.5 placeholder:opacity-45" placeholder="">
    </div>

    <div class="w-full flex flex-col items-start justify-start gap-1.5">
      <label for="order_dest" class="text-base text-pos_col capitalize font-bold">Order destination</label>
      <input type="text" id="order_dest" name="order_dest"
        class="w-full border-2 border-pos_col/45 rounded-md px-5 py-1.5 placeholder:opacity-45" placeholder="">
    </div>

    <div class="w-full flex flex-col items-start justify-start gap-1.5">
      <label for="order_type" class="text-base text-pos_col capitalize font-bold">select Order type</label>
      <select id="order_type" name="order_type"
        class="w-full border-2 border-pos_col/45 rounded-md px-5 py-1.5 bg-transparent accent-pos_col">
        <option value="dinein" selected>DineIn</option>
        <option value="delivery">Delivery</option>
        <option value="takeaway">TakeAway</option>
      </select>
    </div>

    <div class="w-full flex flex-col items-start justify-start gap-1.5">
      <label for="order_status" class="text-base text-pos_col capitalize font-bold">Order status</label>
      <select id="order_status" name="order_status"
        class="w-full border-2 border-pos_col/45 rounded-md px-5 py-1.5 bg-transparent">
        <option value="placed" selected>Placed</option>
      </select>
    </div>
  </form>
</aside>

<script>
  function searchTable() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const cards = document.querySelectorAll(".product_cards");

    cards.forEach(card => {
      const title = card.querySelector("h4");
      if (!title) return;

      const text = title.innerText.toLowerCase();
      card.style.display = text.includes(input) ? "" : "none";
    });
  };
</script>
