{{ template "head" . }}

<main class="relative w-[60%] h-full flex flex-col items-center justify-start p-5 pb-11 mt-[70px] gap-5 bg-pos_bla/10">
  <div id="products-card" class="relative w-full h-full flex flex-col items-start justify-start pb-11 gap-2.5">
    <div class="w-full flex items-center justify-between">
      <h3 class="text-2xl text-pos_bla font-black shrink-0">Search Meals</h3>
      <input type="search" id="searchInput" onkeyup="searchTable()" placeholder="Search..."
        class="mb-4 w-[75%] p-2 border border-pos_bla/25 rounded outline-none">
    </div>
    <section class="w-full grid grid-cols-2 justify-start gap-3 snap-mandatory snap-y scroll-pb-9 overflow-y-scroll">
      {{ range .products }}
      {{ template "product_card" .}}
      {{ end }}
    </section>
  </div>
</main>

<aside class="w-[25%] h-full flex-col items-start justify-start p-5 border-l-2 border-l-pos_lgh/25 bg-pos_whi">
  <section id="receipt" class="w-full h-full flex-col items-start justify-between">
    {{ if .selectedOrder }}
    {{ template "receipt" .selectedOrder }}
    {{ else }}
    <h3 class="text-2xl text-pos_bla font-black">Please Select An Order To See Details...</h3>
    {{ end }}
  </section>
</aside>

<script>
  // Search functionality
  function searchTable() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.querySelectorAll(".product_cards div h4");
    const cards = document.querySelectorAll(".product_cards");

    rows.forEach(row => {
      cards.forEach(card => {
        const text = row.innerText.toLowerCase();
        card.style.display = text.includes(input) ? "" : "none";
      });
    });
  }
</script>

{{ template "foot" . }}
