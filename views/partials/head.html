{{ define "head" }}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="viewport" content="width=1367">
  <title>Point Of Sale</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP&display=swap" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=M+PLUS+1+Code:wght@100..700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Estedad:wght@100..900&family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&family=Momo+Trust+Sans:wght@200..800&family=Science+Gothic:wght@100..900&display=swap"
    rel="stylesheet">

  <!-- icons -->
  <link href="/assets/hugeicons.css" rel="stylesheet">
  <link href="/assets/card.png" rel="shortcut icon" type="image/x-icon" />

  <link href="/css/output.min.css" rel="stylesheet">
  <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

  <script src="/js/alpine.min.js" defer></script>
  <script src="/js/htmx.min.js" defer></script>
  <script src="/js/main.js" defer></script>
</head>

<body class="bg-pos_bla w-screen aspect-[16/10] flex items-start justify-center">
  <div class="relative w-screen h-full flex items-start justify-between gap-0 overflow-clip bg-pos_whi">
    <header class="w-[15%] h-full flex flex-col items-start justify-start p-5 border-r border-r-pos_cld/25 bg-pos_col">
      <div class="w-full flex flex-col gap-7">
        <div class="w-fit flex flex-col items-start justify-center gap-0">
          <h3 class="text-xl text-pos_whi font-bold leading-none">Cashier's Name</h3>
          <p class="text-pos_whi">{{ .user }}</p>
        </div>

        <nav class="w-full flex flex-col items-start justify-start gap-9">
          <div class="w-full flex flex-col items-start justify-start gap-3.5">
            <h3 class="text-xl text-pos_whi font-black">Main Menu</h3>
            <div class="w-full flex flex-col items-start justify-start gap-2 pl-2.5">
              <a href="/" hx-get="/" hx-target="#page" hx-swap="innerHTML" hx-push-url="true"
                class="w-full flex items-end justify-start gap-2 text-base text-pos_whi hover:opacity-65">
                <i class="hgi hgi-stroke hgi-dashboard-square-03 text-3xl"></i>
                <span>Dashboard</span>
              </a>
              <a href="/pos/orders"
                class="w-full flex items-end justify-start gap-2 text-base text-pos_whi hover:opacity-65">
                <i class="hgi hgi-stroke hgi-menu-restaurant text-3xl"></i>
                <span>Orders</span>
              </a>
              <a href="/pos/tables"
                class="w-full flex items-end justify-start gap-2 text-base text-pos_whi hover:opacity-65">
                <i class="hgi hgi-stroke hgi-dining-table text-3xl"></i>
                <span>Tables</span>
              </a>
              <a href="/pos/waitlist" hx-get="/pos/waitlist" hx-target="#page" hx-swap="innerHTML" hx-push-url="true"
                class="w-full flex items-end justify-start gap-2 text-base text-pos_whi hover:opacity-65">
                <i class="hgi hgi-stroke hgi-waiters text-3xl"></i>
                <span>Waitlist</span>
              </a>
              <a class="w-full flex items-end justify-start gap-2 text-base text-pos_whi hover:opacity-65">
                <i class="hgi hgi-stroke hgi-license-pin text-3xl"></i>
                <span>Reservations</span>
              </a>
            </div>
          </div>
          <div class="w-full flex flex-col items-start justify-start gap-3.5">
            <h3 class="text-xl text-pos_whi font-semibold">Company</h3>
            <div class="w-full flex flex-col items-start justify-start gap-2 pl-2.5">
              <button class="w-full flex items-end justify-start gap-2 text-base text-pos_whi hover:opacity-65">
                <i class="hgi hgi-stroke hgi-analytics-02 text-3xl"></i>
                <span>Analytics</span>
              </button>
              <button class="w-full flex items-end justify-start gap-2 text-base text-pos_whi hover:opacity-65">
                <i class="hgi hgi-stroke hgi-store-management-02 text-3xl"></i>
                <span>Manage</span>
              </button>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <menu
      class="absolute w-[60%] h-[4.5rem] px-7 py-3.5 flex items-center justify-between top-0 right-[25%] border-b-2 border-b-pos_lgh/25 bg-pos_whi">
      <h1 class="w-full flex flex-col items-start justify-center gap-0 text-2xl font-bold mono">
        {{if .CanAcceptDineIn}}
        <span class="text-pos_dlv">We are accepting DineIn orders.</span>
        {{else}}
        <span class="text-pos_rdy">Restaurant is Full. DineIn is currently disabled.</span>
        {{end}}
      </h1>
    </menu>
    {{ end }}

    {{ define "foot" }}
  </div>
</body>

</html>
{{ end }}
