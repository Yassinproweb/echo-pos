{{ define "receipt" }}
<div class="w-full h-full flex flex-col items-start justify-start gap-2.5 bg-pos_whi">
  <h2 class="text-xl text-pos_bla font-bold">Order Details</h2>

  <div class="w-full flex items-center justify-between">
    <h3 class="text-2xl text-pos_bla font-black">{{ .Name }}</h3>
    <h5 class="text-base text-pos_bla font-semibold">{{ .Status }}</h5>
  </div>

  <div id="receipt_card"
    class="w-full h-max flex flex-col items-start justify-start gap-1.5 p-3 border-2 border-pos_lgh/15 mono">
    {{ template "receipt_card" .}}
  </div>

  <div class="w-full flex flex-col items-start justify-start gap-5">
    {{ $isCanceled := eq .Status "Canceled" }}
    {{ $isNotReady := ne .Status "Ready" }}

    {{ if or $isCanceled $isNotReady }}
    <button disabled
      class="w-full flex items-center justify-center py-3 text-pos_whi rounded-xl bg-pos_col/55 cursor-not-allowed hover:bg-pos_col/65">
      Print Receipt</button>
    {{ else }}
    <button onclick="handlePrint('{{ .Name | urlquery }}', '{{ .Type }}')"
      class="w-full flex items-center justify-center py-3 text-pos_whi rounded-xl bg-pos_col transition-all hover:bg-pos_col/85">
      Print Receipt</button>
    {{ end }}
  </div>
</div>
{{ end }}
