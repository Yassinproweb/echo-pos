<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="viewport" content="width=1367">
  <title>Point Of Sale - Swap Items</title>

  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap"
    rel="stylesheet">
  <link href="/assets/hugeicons.css" rel="stylesheet">
  <link href="/assets/card.png" rel="shortcut icon" type="image/x-icon" />
  <link href="/css/output.min.css" rel="stylesheet">

  <script src="/js/alpine.min.js" defer></script>
</head>

<body class="bg-pos_bla h-screen flex items-start justify-center">
  <div class="relative w-screen aspect-[16/10] flex items-start justify-between gap-0 bg-pos_whi overflow-y-scroll">
    <div x-data="editOrderApp()" class="w-full h-full flex flex-col p-5 gap-3.5">
      <section class="w-full flex items-center justify-between">
        <h3 class="text-2xl text-pos_bla font-black">Swap Items — {{ .Order.Name }}</h3>
        <a href="/pos/orders" class="text-pos_col font-medium underline">Back to Orders</a>
      </section>

      {{ if not .Order.IsEditable }}
      <div class="text-base text-pos_cld font-medium p-1 py-0.5 border-2 border-pos_cld/45 rounded bg-pos_cld/5">This
        order can no longer be edited (status: {{ .Order.Status }}).</div>
      {{ else }}
      <form id="form" method="POST" action="/pos/order/{{ .Order.Name | urlquery }}/items"
        class="w-full h-[95%] flex flex-col items-center justify-start gap-5">
        <input type="hidden" name="items" :value="JSON.stringify(items)">

        <section class="w-full flex-1 grid grid-cols-5 gap-5 snap-mandatory snap-y scroll-pb-5 overflow-y-scroll">
          {{ range .products }}
          {{ template "product_view" . }}
          {{ end }}
        </section>

        <button type="submit" :disabled="items.length === 0"
          class="w-full border-2 border-pos_col/45 px-5 py-2 text-base text-pos_whi text-center font-medium rounded-md bg-pos_col disabled:opacity-50 disabled:cursor-not-allowed">
          Save Changes
        </button>
      </form>
      {{ end }}
    </div>
  </div>

  <script>
    function editOrderApp() {
      const initial = JSON.parse(atob("{{ .InitialItemsB64 }}")) || [];

      return {
        items: initial.map(i => ({name: i.name, quantity: i.quantity, unitPrice: i.unitPrice})),
        quantities: Object.fromEntries(initial.map(i => [i.name, i.quantity])),

        increase(name, price) {
          if (!this.quantities[name]) this.quantities[name] = 0;
          this.quantities[name]++;

          const existing = this.items.find(i => i.name === name);
          if (existing) {
            existing.quantity++;
          } else {
            this.items.push({name: name, quantity: 1, unitPrice: price});
          }
        },

        decrease(name) {
          if (!this.quantities[name]) return;
          this.quantities[name]--;
          if (this.quantities[name] <= 0) delete this.quantities[name];

          const existing = this.items.find(i => i.name === name);
          if (!existing) return;
          existing.quantity--;
          if (existing.quantity <= 0) {
            this.items = this.items.filter(i => i.name !== name);
          }
        }
      }
    }
  </script>
</body>

</html>
